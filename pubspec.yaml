name: flutter_api
description: "A Flutter package for common APIs like login, registration, payment, etc."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Network
  dio: ^5.4.0
  json_serializable: ^6.8.0
  freezed_annotation: ^3.1.0
  intl: ^0.20.1
  retrofit: 4.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.13
  json_serializable: ^6.8.0
  freezed: ^3.0.6
  retrofit_generator: 9.7.0

flutter:
  uses-material-design: true
